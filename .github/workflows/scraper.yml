name: Run scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        uses: microsoft/playwright-github-action@v1

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.uaqakssusydpjzrcznhb }}
          SUPABASE_SERVICE_KEY: ${{ secrets.sb_secret_EIMoTlM0NuX6D6mFYM_Igg_rdkTSq_i }}
        run: python scraper/scraper.py
