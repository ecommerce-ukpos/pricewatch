name: Price Scraper

on:
  schedule:
    # Price scrape — every 3 days (Mon/Thu/Sun at 1am)
    # Only visits confirmed competitor URLs — fast and reliable
    - cron: '0 1 * * 0,1,4'

  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'scrape'
        type: choice
        options:
          - scrape      # price scrape of confirmed URLs (default, scheduled)
          - discover    # URL discovery — find new competitor product pages
      scraper_skus:
        description: 'Comma-separated SKU IDs (optional — targets specific SKUs only)'
        required: false
        default: ''
      scraper_workers:
        description: 'Parallel workers (scrape default: 5, discover default: 2)'
        required: false
        default: ''
      discover_force:
        description: 'Re-discover already-matched SKUs? (discover only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      discover_sku_limit:
        description: 'Max SKUs per discovery run (default 250)'
        required: false
        default: '250'

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase playwright httpx

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Determine job for scheduled runs
        id: job
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "job=scrape" >> $GITHUB_OUTPUT
          else
            echo "job=${{ github.event.inputs.job || 'scrape' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run price scrape
        if: steps.job.outputs.job == 'scrape'
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SCRAPER_SKUS:         ${{ github.event.inputs.scraper_skus || '' }}
          SCRAPER_WORKERS:      ${{ github.event.inputs.scraper_workers || '5' }}
          SCRAPER_DELAY_MIN:    '3'
          SCRAPER_DELAY_MAX:    '7'
        run: python scraper/scrape.py scheduled

      - name: Run URL discovery
        if: steps.job.outputs.job == 'discover'
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          DISCOVER_SKUS:         ${{ github.event.inputs.scraper_skus || '' }}
          DISCOVER_WORKERS:      ${{ github.event.inputs.scraper_workers || '2' }}
          DISCOVER_FORCE:        ${{ github.event.inputs.discover_force || 'false' }}
          DISCOVER_SKU_LIMIT:    ${{ github.event.inputs.discover_sku_limit || '250' }}
          DISCOVER_DELAY_MIN:    '8'
          DISCOVER_DELAY_MAX:    '15'
        run: python scraper/discover.py
