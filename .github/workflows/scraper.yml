name: Price Scraper

on:
  schedule:
    # Matched run — re-scrapes all confirmed URLs in one go, every 3 days
    # Runs at 1am on Mon, Thu, Sun (every ~3 days)
    - cron: '0 1 * * 0,1,4'

    # Batch search run — finds new matches across unscraped SKUs
    # Mon–Fri only, 570 SKUs/day ≈ 20k pairs/week, full pass in ~5 working days
    - cron: '0 3 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: true
        default: 'matched'
        type: choice
        options:
          - matched    # re-scrape all confirmed URLs in one go
          - batch      # search phase — next 570 unscraped SKUs
          - skus       # specific SKU IDs only
          - full       # all SKUs × all competitors (slow, use batch instead)
      batch_size:
        description: 'SKUs per batch run (mode=batch only, default 570)'
        required: false
        default: '570'
      batch_id:
        description: 'Batch group label e.g. 2026-Q2 (blank = auto-generated)'
        required: false
        default: ''
      scraper_skus:
        description: 'Comma-separated SKU IDs (mode=skus only)'
        required: false
        default: ''
      scraper_workers:
        description: 'Parallel workers (default: 5)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase playwright

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Determine mode for scheduled runs
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "03" ]; then
              echo "mode=batch"   >> $GITHUB_OUTPUT
              echo "batch_size=570" >> $GITHUB_OUTPUT
            else
              echo "mode=matched" >> $GITHUB_OUTPUT
              echo "batch_size=570" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=${{ github.event.inputs.mode || 'matched' }}" >> $GITHUB_OUTPUT
            echo "batch_size=${{ github.event.inputs.batch_size || '570' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SCRAPER_MODE:         ${{ steps.mode.outputs.mode }}
          SCRAPER_SKUS:         ${{ github.event.inputs.scraper_skus }}
          SCRAPER_WORKERS:      ${{ github.event.inputs.scraper_workers || '5' }}
          SCRAPER_DELAY_MIN:    '3'
          SCRAPER_DELAY_MAX:    '7'
          SCRAPER_BATCH_SIZE:   ${{ steps.mode.outputs.batch_size }}
          SCRAPER_BATCH_ID:     ${{ github.event.inputs.batch_id || '' }}
        run: python scraper/scraper.py
