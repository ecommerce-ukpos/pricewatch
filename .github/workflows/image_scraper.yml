name: Image Scraper

on:
  schedule:
    # 2am on the 1st of January, April, July, October — quarterly
    - cron: '0 2 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-download all images (ignore last sync date)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      sku_limit:
        description: 'Max SKUs to process (0 = all, default 5000)'
        required: false
        default: '5000'

jobs:
  scrape-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install supabase httpx

      - name: Run image scraper
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IMAGE_WORKERS:       '10'
          IMAGE_REFRESH_DAYS:  '90'
          IMAGE_SKU_LIMIT:     ${{ github.event.inputs.sku_limit || '5000' }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          python scraper/image_scraper.py $ARGS
